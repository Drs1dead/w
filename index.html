<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сайт с переходом</title>
    <style>
        /* Плавные переходы для всего сайта */
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            transition: background-color 0.6s ease, color 0.6s ease;
            background-color: #f0f2f5; /* Цвет светлой темы */
            color: #1a1a1a;
        }

        /* Настройки темного режима */
        body.dark-mode {
            background-color: #121214; /* Глубокий темный цвет */
            color: #ffffff;
        }

        /* Стиль синей кнопки со свечением */
        .link-button {
            display: inline-block;
            margin-top: 20px;
            padding: 16px 36px;
            font-size: 18px;
            font-weight: 600;
            text-decoration: none;
            color: white;
            background: linear-gradient(135deg, #0052D4, #4364F7); /* Красивый синий градиент */
            border-radius: 14px;
            box-shadow: 0 4px 15px rgba(67, 100, 247, 0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        /* Эффект при наведении на синюю кнопку */
        .link-button:hover {
            transform: translateY(-4px); /* Кнопка чуть поднимается */
            box-shadow: 0 8px 25px rgba(67, 100, 247, 0.7); /* Усиливаем свечение */
        }

        /* Кнопка переключения темы */
        .theme-toggle {
            position: absolute;
            top: 30px;
            right: 30px;
            padding: 10px 20px;
            font-size: 14px;
            background: rgba(150, 150, 150, 0.2);
            border: 1px solid rgba(150, 150, 150, 0.3);
            border-radius: 20px;
            color: inherit;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: background 0.3s ease, transform 0.3s ease;
        }

        .theme-toggle:hover {
            background: rgba(150, 150, 150, 0.4);
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()">Переключить тему</button>

    <div style="text-align: center;">
        <h1>Добро пожаловать</h1>
        <p>Нажми на кнопку ниже, чтобы перейти дальше.</p>

        <a href="https://твой-сайт.com" class="link-button">Перейти на сайт</a>
    </div>

    <script>
        function toggleTheme() {
            // Добавляет или убирает класс 'dark-mode' у body
            document.body.classList.toggle('dark-mode');
        }
    </script>

</body>
</html>
